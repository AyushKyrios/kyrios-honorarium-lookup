<script>
// ═══════════════════════════════════════════════════════════════
// MSAL AUTH
// ═══════════════════════════════════════════════════════════════
const CFG = window.APP_CONFIG;
let msalApp = null;
const SCOPES = ["Files.Read", "Sites.Read.All"];

async function getToken() {
  const accounts = msalApp.getAllAccounts();
  if (!accounts.length) throw new Error("Not signed in");
  try {
    const r = await msalApp.acquireTokenSilent({ scopes: SCOPES, account: accounts[0] });
    return r.accessToken;
  } catch {
    await msalApp.acquireTokenRedirect({ scopes: SCOPES });
    return null;
  }
}
async function login() {
  try { await msalApp.loginRedirect({ scopes: SCOPES }); }
  catch (e) { showError("Sign-in failed: " + e.message); }
}
function logout()      { msalApp.logoutRedirect(); }
function currentUser() { const a = msalApp.getAllAccounts(); return a.length ? a[0] : null; }

// ═══════════════════════════════════════════════════════════════
// XLSX DOWNLOAD + PARSE
// ═══════════════════════════════════════════════════════════════

async function fetchAndParseSheet(driveId, itemId) {
  const token = await getToken();
  const res = await fetch(
    `https://graph.microsoft.com/v1.0/drives/${driveId}/items/${itemId}/content`,
    { headers: { Authorization: `Bearer ${token}` } }
  );
  if (!res.ok) throw new Error(`Download failed (${res.status})`);

  const buf = await res.arrayBuffer();
  const zip = await JSZip.loadAsync(buf);

  const ssFile = zip.file('xl/sharedStrings.xml');
  const sharedStrings = ssFile ? parseSharedStrings(await ssFile.async('text')) : [];

  const stFile = zip.file('xl/styles.xml');
  const styleColors = stFile ? parseStyleColors(await stFile.async('text')) : [];

  const relsFile = zip.file('xl/_rels/workbook.xml.rels');
  const sheetPaths = relsFile
    ? resolveAllSheetPaths(await relsFile.async('text'))
    : ['xl/worksheets/sheet1.xml'];

  let allRecords = [];
  for (const sheetPath of sheetPaths) {
    const shFile = zip.file(sheetPath);
    if (!shFile) continue;
    const rows = parseSheetXml(await shFile.async('text'), sharedStrings, styleColors);
    const recs = buildRecords(rows);
    console.log(`[${sheetPath}] ${rows.length} rows → ${recs.length} records`);
    allRecords = allRecords.concat(recs);
  }
  return allRecords;
}

// ── XML helpers ──────────────────────────────────────────────

function parseSharedStrings(xml) {
  const doc = new DOMParser().parseFromString(xml, 'text/xml');
  return Array.from(doc.querySelectorAll('si')).map(si =>
    Array.from(si.querySelectorAll('t')).map(t => t.textContent).join('')
  );
}

function parseStyleColors(xml) {
  const doc = new DOMParser().parseFromString(xml, 'text/xml');
  const INDEXED = [
    '#000000','#FFFFFF','#FF0000','#00FF00','#0000FF','#FFFF00','#FF00FF','#00FFFF',
    '#000000','#FFFFFF','#FF0000','#00FF00','#0000FF','#FFFF00','#FF00FF','#00FFFF',
    '#800000','#008000','#000080','#808000','#800080','#008080','#C0C0C0','#808080',
    '#9999FF','#993366','#FFFFCC','#CCFFFF','#660066','#FF8080','#0066CC','#CCCCFF',
    '#000080','#FF00FF','#FFFF00','#00FFFF','#800080','#800000','#008080','#0000FF',
    '#00CCFF','#CCFFFF','#CCFFCC','#FFFF99','#99CCFF','#FF99CC','#CC99FF','#FFCC99',
    '#3366FF','#33CCCC','#99CC00','#FFCC00','#FF9900','#FF6600','#666699','#969696',
    '#003366','#339966','#003300','#333300','#993300','#993366','#333399','#333333'
  ];
  const fills = Array.from(doc.querySelectorAll('fills > fill')).map(f => {
    const pf = f.querySelector('patternFill');
    if (!pf) return null;
    if ((pf.getAttribute('patternType') || '') === 'none') return null;
    const fg = pf.querySelector('fgColor');
    if (!fg) return null;
    const rgb = fg.getAttribute('rgb'), indexed = fg.getAttribute('indexed');
    if (rgb && rgb.length === 8) return '#' + rgb.slice(2).toUpperCase();
    if (indexed !== null) return INDEXED[parseInt(indexed)] || null;
    return null;
  });
  return Array.from(doc.querySelectorAll('cellXfs > xf')).map(xf => {
    const fid = parseInt(xf.getAttribute('fillId') || '0');
    return fills[fid] || null;
  });
}

function resolveAllSheetPaths(relsXml) {
  const doc = new DOMParser().parseFromString(relsXml, 'text/xml');
  const paths = [];
  for (const rel of doc.querySelectorAll('Relationship')) {
    if (!(rel.getAttribute('Type') || '').includes('/worksheet')) continue;
    let t = rel.getAttribute('Target') || '';
    if (t.startsWith('/')) t = t.slice(1);
    else if (!t.startsWith('xl/')) t = 'xl/' + t;
    paths.push(t);
  }
  return paths.length ? paths : ['xl/worksheets/sheet1.xml'];
}

function colToIndex(col) {
  let n = 0;
  for (const c of col) n = n * 26 + c.charCodeAt(0) - 64;
  return n - 1;
}

function parseSheetXml(xml, sharedStrings, styleColors) {
  const doc  = new DOMParser().parseFromString(xml, 'text/xml');
  const rows = [];
  for (const rowEl of doc.querySelectorAll('row')) {
    const cells = Array.from(rowEl.querySelectorAll('c'));
    if (!cells.length) { rows.push({ values: [], rowColor: null }); continue; }
    const lastRef  = cells[cells.length - 1].getAttribute('r') || 'A1';
    const lastCol  = lastRef.match(/[A-Z]+/)?.[0] || 'A';
    const colCount = colToIndex(lastCol) + 1;
    const values   = new Array(colCount).fill('');
    let rowColor   = null;
    for (const cell of cells) {
      const ref  = cell.getAttribute('r') || 'A1';
      const col  = ref.match(/[A-Z]+/)?.[0] || 'A';
      const cidx = colToIndex(col);
      const type = cell.getAttribute('t') || '';
      const sIdx = parseInt(cell.getAttribute('s') || '0');
      const vEl  = cell.querySelector('v');
      let val = '';
      if (vEl) {
        val = type === 's'
          ? (sharedStrings[parseInt(vEl.textContent)] ?? '')
          : vEl.textContent;
      }
      if (cidx < colCount) values[cidx] = String(val);
      if (!rowColor && styleColors[sIdx]) rowColor = styleColors[sIdx];
    }
    rows.push({ values, rowColor });
  }
  return rows;
}

  "first name":                "firstName",
  "last name":                 "lastName",
  "email":                     "email",
  "designation":               "designation",
  "amount in usd":             "amountUSD",
  "amount in native currency": "amountNative",
  "country":                   "country",
  "recruiter name":            "recruiter",
  "study type":                "studyType",
  "comment":                   "comment"
};

function buildRecords(rawRows) {
  if (!rawRows.length) return [];
  let hIdx = 0;
  for (let i = 0; i < Math.min(12, rawRows.length); i++) {
    const cells = rawRows[i].values.map(c => String(c).trim().toLowerCase());
    if (HEADER_SIGNALS.filter(s => cells.includes(s)).length >= 2) { hIdx = i; break; }
  }
  const hCells = rawRows[hIdx].values.map(c => String(c).trim().toLowerCase());
  const colIdx = {};
  hCells.forEach((h, i) => { if (COL_MAP[h]) colIdx[COL_MAP[h]] = i; });
  const records = [];
  for (let i = hIdx + 1; i < rawRows.length; i++) {
    const { values, rowColor } = rawRows[i];
    if (!values.length || values.every(v => !v)) continue;
    const rec = { rowColor };
    Object.entries(colIdx).forEach(([field, ci]) => {
      rec[field] = ci < values.length ? String(values[ci] || '').trim() : '';
    });
    if (!rec.firstName && !rec.email) continue;
    records.push(rec);
  }
  return records;
}

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════

function excelDateToJS(val) {
  if (!val) return null;
  const s = String(val).trim();
  if (/[\/\-]/.test(s)) {
    const d = new Date(s); return isNaN(d) ? null : d;
  }
  const n = parseFloat(s);
  if (isNaN(n) || n < 1) return null;
  const d = new Date(Math.round((n - 25569) * 86400000));
  return isNaN(d.getTime()) ? null : d;
}

function parseUSD(val) {
  if (!val) return 0;
  const n = parseFloat(String(val).replace(/[^0-9.-]/g, ''));
  return isNaN(n) ? 0 : n;
}

function formatEntryDate(val) {
  const d = excelDateToJS(val);
  if (!d) return val || '—';
  return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
}

function monthKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
}
function monthLabel(d) {
  return d.toLocaleString('default', { month: 'short', year: 'numeric' });
}

function destroyChart(id) {
  if (charts[id]) { charts[id].destroy(); delete charts[id]; }
}

// ═══════════════════════════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════════════════════════

function match(rec, q) {
  const name  = `${rec.firstName || ''} ${rec.lastName || ''}`.toLowerCase();
  const email = (rec.email || '').toLowerCase();
  return name.includes(q) || email.includes(q);
}

function search(query) {
  const q = query.toLowerCase().trim();
  return datasets.map(d => ({ ...d, results: q ? d.records.filter(r => match(r, q)) : [] }));
}

// ═══════════════════════════════════════════════════════════════
// ANALYTICS
// ═══════════════════════════════════════════════════════════════

function findDuplicates() {
  const byEmail = {};
  datasets.forEach(ds => {
    ds.records.forEach(r => {
      const key = (r.email || '').toLowerCase().trim();
      if (!key) return;
      if (!byEmail[key]) byEmail[key] = [];
      byEmail[key].push({ ...r, sheetLabel: ds.label, dotClass: ds.dotClass });
    });
  });
  const groups = [];
  Object.entries(byEmail).forEach(([email, recs]) => {
    if (recs.length < 2) return;
    const sheetSet = [...new Set(recs.map(r => r.sheetLabel))];
    groups.push({
      email,
      name: [recs[0].firstName, recs[0].lastName].filter(Boolean).join(' '),
      entries: recs,
      crossSheet: sheetSet.length > 1,
      sheets: sheetSet
    });
  });
  groups.sort((a, b) => {
    if (a.crossSheet !== b.crossSheet) return a.crossSheet ? -1 : 1;
    return b.entries.length - a.entries.length;
  });
  return groups;
}

function getDashboardData() {
  const sheetTotals = datasets.map(d => ({
    label: d.label, dotClass: d.dotClass, count: d.records.length
  }));

  // Monthly USD map
  const mMap = {};
  datasets.forEach(ds => {
    ds.records.forEach(r => {
      const d = excelDateToJS(r.date);
      if (!d) return;
      const k = monthKey(d);
      if (!mMap[k]) mMap[k] = { key: k, label: monthLabel(d), usd: 0 };
      mMap[k].usd += parseUSD(r.amountUSD);
    });
  });
  const monthly = Object.values(mMap).sort((a, b) => a.key.localeCompare(b.key));

  // Top 10 by count
  const byEmail = {};
  datasets.forEach(ds => {
    ds.records.forEach(r => {
      const key = (r.email || '').toLowerCase().trim()
                  || `${r.firstName||''} ${r.lastName||''}`.trim().toLowerCase();
      if (!key) return;
      if (!byEmail[key]) byEmail[key] = { count: 0, best: r };
      byEmail[key].count++;
      // Keep the most complete record as representative
      const c = byEmail[key].best;
      if ((!c.designation && r.designation) || (!c.country && r.country) || (!c.studyType && r.studyType)) {
        byEmail[key].best = { ...c, ...Object.fromEntries(Object.entries(r).filter(([,v]) => v)) };
      }
    });
  });
  const top10 = Object.values(byEmail)
    .sort((a, b) => b.count - a.count)
    .slice(0, 10);

  return { sheetTotals, monthly, top10 };
}

async function loadAllSheets() {
  datasets = CFG.sheets.map(s => ({ ...s, records: [], error: null, loading: true }));
  renderView();

  const results = await Promise.allSettled(
    CFG.sheets.map(s => fetchAndParseSheet(s.driveId, s.itemId))
  );

  results.forEach((r, i) => {
    datasets[i].loading = false;
    if (r.status === 'fulfilled') {
      datasets[i].records = r.value;
    } else {
      datasets[i].error = r.reason?.message || 'Unknown error';
    }
  });

  loaded = true;
  const total = datasets.reduce((s, d) => s + d.records.length, 0);
  const statsEl = document.getElementById('data-stats');
  if (statsEl) statsEl.innerHTML =
    `<strong>${total.toLocaleString()}</strong> respondents loaded across ${datasets.length} sheets`;
  renderView();
}

          2. Name it <em>Kyrios Honorarium Lookup</em>, register<br>
          3. Copy <strong>Application (client) ID</strong> and <strong>Directory (tenant) ID</strong><br>
          4. Open <code>index.html</code> and replace the placeholder IDs<br>
          5. Add API permissions: <strong>Files.Read</strong> + <strong>Sites.Read.All</strong>
        </div>
      </div>
    </div>`;
}

async function boot() {
  if (!isConfigured()) { renderSetupRequired(); return; }
  try {
    if (typeof msal === 'undefined') {
      throw new Error('Microsoft authentication library (MSAL) failed to load. Please check your internet connection and try refreshing the page.');
    }
    msalApp = new msal.PublicClientApplication({
      auth: {
        clientId:    CFG.clientId,
        authority:   `https://login.microsoftonline.com/${CFG.tenantId}`,
        redirectUri: window.location.origin
      },
      cache: { cacheLocation: "sessionStorage", storeAuthStateInCookie: false }
    });
    await msalApp.initialize();
    await msalApp.handleRedirectPromise().catch(() => {});

    if (currentUser()) {
      renderView();
      loadAllSheets();
    } else {
      renderLogin();
    }
  } catch (e) {
    document.getElementById('header-right').innerHTML = '';
    document.getElementById('nav-area').innerHTML     = '';
    document.getElementById('root').innerHTML = `
      <div class="login-wrap">
        <div class="login-card">
          <div class="login-icon">⚠️</div>
          <h2 style="margin-bottom:12px">Couldn't start the app</h2>
          <div class="error-msg" style="text-align:left">${esc(e.message)}</div>
          <p style="margin-top:16px;font-size:13px;color:#666">
            Check that your <strong>Client ID</strong> and <strong>Tenant ID</strong> in <code>index.html</code> are correct,
            and that the redirect URI is registered in Azure AD.
          </p>
        </div>
      </div>`;
  }
}

boot();
</script>
</body>
</html>
